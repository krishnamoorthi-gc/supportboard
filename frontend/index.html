<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SupportDesk — AI-Powered Customer Support</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #07090f; color: #e8eeff; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      @keyframes pulse { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
      .skel { background: linear-gradient(90deg, #161c2a 25%, #1c2238 50%, #161c2a 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
      @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
