<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>OnlyPOA — AI-Powered Customer Support Platform</title>
    <meta name="description" content="OnlyPOA is an AI-first customer support platform. Manage email, live chat, WhatsApp and 15+ channels in one unified inbox. Try free for 14 days." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OnlyPOA" />
    <meta property="og:url" content="https://www.onlypoa.com/" />
    <meta property="og:title" content="OnlyPOA — AI-Powered Customer Support Platform" />
    <meta property="og:description" content="Unify every customer conversation across email, live chat, WhatsApp and 15+ channels. Let AI handle the routine — your team focuses on what matters." />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@onlypoa" />
    <meta name="twitter:title" content="OnlyPOA — AI-Powered Customer Support Platform" />
    <meta name="twitter:description" content="Unify every customer conversation across email, live chat, WhatsApp and 15+ channels." />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.onlypoa.com/" />

    <!-- Live Visitor Tracking -->
    <script src="http://localhost:4002/tracker.js" async></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #07090f; color: #e8eeff; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      @keyframes pulse { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
      .skel { background: linear-gradient(90deg, #161c2a 25%, #1c2238 50%, #161c2a 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
      @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
  </head>
  <body>
    <!-- Static fallback content for crawlers that don't execute JavaScript -->
    <noscript>
      <div style="font-family:sans-serif;text-align:center;padding:60px 24px;background:#07090f;color:#e8eeff;">
        <h1 style="font-size:2rem;margin-bottom:16px;">Supportboard — AI-Powered Customer Support</h1>
        <p style="font-size:1.1rem;color:#94a3c0;max-width:560px;margin:0 auto 24px;">Unify every customer conversation across email, live chat, WhatsApp and 15+ channels.</p>
        <a href="/landing" style="display:inline-block;padding:14px 32px;background:#4c82fb;color:#fff;border-radius:12px;text-decoration:none;font-weight:700;">Learn More</a>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
